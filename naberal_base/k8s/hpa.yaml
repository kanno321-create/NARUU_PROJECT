# KIS Estimator - Horizontal Pod Autoscaler
# Auto-scaling based on CPU, memory, and custom metrics

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kis-estimator
  namespace: kis-estimator
  labels:
    app: kis-estimator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kis-estimator

  # Replica bounds
  minReplicas: 2
  maxReplicas: 20

  # Scaling metrics
  metrics:
    # CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

    # Custom metric: requests per second (requires metrics-server + prometheus-adapter)
    # Uncomment if using custom metrics
    # - type: Pods
    #   pods:
    #     metric:
    #       name: http_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: "100"

  # Scaling behavior
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min

---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kis-estimator
  namespace: kis-estimator
  labels:
    app: kis-estimator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kis-estimator

---
