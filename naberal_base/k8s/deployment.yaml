# KIS Estimator - Kubernetes Deployment
# Production-ready deployment with health checks, resource limits, and rolling updates

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kis-estimator
  namespace: kis-estimator
  labels:
    app: kis-estimator
    version: v2
    tier: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: kis-estimator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kis-estimator
        version: v2
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kis-estimator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: kis-estimator
          image: ghcr.io/naberal/kis-estimator:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: APP_DEBUG
              value: "false"
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: kis-estimator-config
                  key: environment
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: kis-estimator-config
                  key: cors_origins
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kis-estimator-secrets
                  key: database_url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kis-estimator-secrets
                  key: jwt_secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: kis-estimator-secrets
                  key: redis_url
                  optional: true

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Liveness probe - is the container running?
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - is the container ready to serve traffic?
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup probe - for slow-starting containers
          startupProbe:
            httpGet:
              path: /v1/health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: kis-estimator
                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: kis-estimator

      terminationGracePeriodSeconds: 30

---
# ServiceAccount for RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kis-estimator
  namespace: kis-estimator
  labels:
    app: kis-estimator
