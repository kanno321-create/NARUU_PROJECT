# KIS Estimator - Kubernetes Secrets Template
# WARNING: This is a TEMPLATE file. Do NOT commit actual secrets!
# Use kubectl create secret or external secrets manager in production.

# Instructions for creating secrets:
#
# Option 1: kubectl create secret (recommended for CI/CD)
# ```bash
# kubectl create secret generic kis-estimator-secrets \
#   --namespace=kis-estimator \
#   --from-literal=database_url='postgresql+asyncpg://user:pass@host:5432/db' \
#   --from-literal=jwt_secret='your-32-character-secret-key' \
#   --from-literal=redis_url='redis://redis:6379/0'
# ```
#
# Option 2: External Secrets Operator (recommended for production)
# See: https://external-secrets.io/
#
# Option 3: Sealed Secrets (GitOps friendly)
# See: https://sealed-secrets.netlify.app/

apiVersion: v1
kind: Secret
metadata:
  name: kis-estimator-secrets
  namespace: kis-estimator
  labels:
    app: kis-estimator
type: Opaque
stringData:
  # PostgreSQL Database URL (asyncpg driver)
  # Format: postgresql+asyncpg://[user]:[password]@[host]:[port]/[database]
  database_url: "REPLACE_WITH_ACTUAL_DATABASE_URL"

  # JWT Secret for authentication (min 32 characters)
  jwt_secret: "REPLACE_WITH_ACTUAL_JWT_SECRET"

  # Redis URL for caching (optional)
  redis_url: "REPLACE_WITH_ACTUAL_REDIS_URL"

  # AWS credentials for S3 (PDF storage)
  aws_access_key_id: "REPLACE_WITH_AWS_ACCESS_KEY"
  aws_secret_access_key: "REPLACE_WITH_AWS_SECRET_KEY"

---
