# KIS Estimator - Kubernetes Ingress
# NGINX Ingress with TLS, rate limiting, and CORS

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kis-estimator
  namespace: kis-estimator
  labels:
    app: kis-estimator
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: nginx

    # TLS/SSL
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Body size (for PDF uploads)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # CORS (handled by app, but backup here)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://kis-estimator.com,https://app.kis-estimator.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.kis-estimator.com
      secretName: kis-estimator-tls
  rules:
    - host: api.kis-estimator.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kis-estimator
                port:
                  number: 80

---
# Staging Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kis-estimator-staging
  namespace: kis-estimator-staging
  labels:
    app: kis-estimator
    environment: staging
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging-api.kis-estimator.com
      secretName: kis-estimator-staging-tls
  rules:
    - host: staging-api.kis-estimator.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kis-estimator
                port:
                  number: 80

---
# Certificate (if using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kis-estimator-tls
  namespace: kis-estimator
spec:
  secretName: kis-estimator-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - api.kis-estimator.com
