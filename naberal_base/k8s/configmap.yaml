# KIS Estimator - Kubernetes ConfigMap
# Non-sensitive configuration values

apiVersion: v1
kind: ConfigMap
metadata:
  name: kis-estimator-config
  namespace: kis-estimator
  labels:
    app: kis-estimator
data:
  # Environment
  environment: "production"

  # CORS settings
  cors_origins: "https://kis-estimator.com,https://app.kis-estimator.com"

  # API settings
  api_prefix: "/v1"
  api_version: "2.0.0"

  # Cache settings
  cache_ttl_catalog: "900"
  cache_ttl_price: "300"

  # Rate limiting
  rate_limit_requests: "1000"
  rate_limit_window: "3600"

  # Logging
  log_level: "INFO"
  log_format: "json"

  # OpenTelemetry
  otel_service_name: "kis-estimator-api"
  otel_exporter_endpoint: "http://otel-collector:4317"

---
# Staging ConfigMap (for reference)
apiVersion: v1
kind: ConfigMap
metadata:
  name: kis-estimator-config-staging
  namespace: kis-estimator-staging
  labels:
    app: kis-estimator
    environment: staging
data:
  environment: "staging"
  cors_origins: "https://staging.kis-estimator.com,http://localhost:3000"
  api_prefix: "/v1"
  api_version: "2.0.0"
  cache_ttl_catalog: "300"
  cache_ttl_price: "60"
  rate_limit_requests: "100"
  rate_limit_window: "3600"
  log_level: "DEBUG"
  log_format: "json"
  otel_service_name: "kis-estimator-api-staging"
  otel_exporter_endpoint: "http://otel-collector:4317"
