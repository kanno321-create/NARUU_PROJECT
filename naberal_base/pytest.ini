[pytest]
pythonpath = . src

# pytest-asyncio configuration (0.23.8 upgrade)
asyncio_mode = auto
# Note: pytest-asyncio 0.23.8 requires explicit session-scoped event_loop fixture in conftest.py
# See tests/conftest.py for session-scoped event_loop fixture definition
# This enables session-scoped async fixtures (db_engine, http_client) and sync fixtures accessed from async tests

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, file I/O)
    e2e: End-to-end tests (full workflow)
    slow: Slow running tests
    smoke: Smoke tests (quick validation)
    regression: Regression tests (20/20 required)
    critical: Critical path tests that must pass
    requires_db: Tests requiring real database connection (Zero-Mock)
    requires_server: Tests requiring running server (Zero-Mock)
    probe: API probe tests (health, contract, fail-fast)
    flaky: mark test as potentially flaky (with rerun)
    jwt: JWT authentication tests
    jwt_rs256: JWT RS256/JWKS tests
    rag: RAG system tests (ML dependencies, separate process required)
    erp: ERP system tests (requires ERP schema, separate AI system)
    ssot_api: SSOT API tests (requires kis_estimator_core.api.main, not legacy api.main)
    not_implemented: Tests for features not yet implemented (excluded from CI)

# Flaky test prevention (pytest-rerunfailures)
# Temporarily disabled to prevent timeout cascade on httpx/respx version conflicts
reruns = 0
reruns_delay = 0

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

minversion = 3.11

addopts =
    -q
    --asyncio-mode=auto
    --strict-markers
    --tb=short
    -m "not not_implemented"

filterwarnings =
    ignore::DeprecationWarning

[coverage:report]
# Policy Aligned: CLAUDE.md 운영 게이트(라쳇 준비, 상향 여지)
# 2025-11-28: 66% 달성으로 게이트 상향 (60→66)
fail_under = 66

exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == "__main__":
    raise AssertionError
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstract

precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov